{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARAPS | Secure Login</title>
    <link rel="manifest" href="{% static 'manifest.json' %}">
    <meta name="theme-color" content="#1e3c72">
    <!-- Google Fonts + Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .login-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border-radius: 28px;
            padding: 2.5rem;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f8fafc;
            transition: transform 0.3s ease;
        }
        .login-card:hover {
            transform: translateY(-2px);
        }
        .brand-icon {
            font-size: 3rem;
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
        }
        .form-control-custom {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 40px;
            color: #f8fafc !important;
            padding: 12px 20px;
            transition: all 0.3s;
        }
        .form-control-custom:focus {
            background: rgba(15, 23, 42, 0.8);
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.25);
            outline: none;
        }
        .btn-login {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            padding: 12px;
            transition: all 0.3s;
            margin-top: 1rem;
        }
        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.45);
        }
        footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #94a3b8;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="w-100" style="max-width: 440px;">
    <div class="login-card text-center">
        <div class="brand-icon"><i class="fas fa-chart-line"></i></div>
        <h3 class="fw-bold mb-1">ARAPS</h3>
        <p class="text-muted small mb-4">Academic Result Analysis & Prediction System</p>
        
        {% if form.errors %}
        <div class="alert alert-danger border-0 bg-danger bg-opacity-20 text-danger rounded-4 py-2 px-3 mb-4 text-start small" role="alert">
            <i class="fas fa-exclamation-circle me-2"></i>Invalid username or password.
        </div>
        {% endif %}

        <form method="post" class="text-start">
            {% csrf_token %}
            <div class="mb-3">
                <label for="id_username" class="form-label text-muted small fw-semibold ps-2">Username</label>
                <input type="text" name="username" id="id_username" class="form-control form-control-custom" placeholder="Enter username" required autofocus>
            </div>
            
            <div class="mb-4">
                <label for="id_password" class="form-label text-muted small fw-semibold ps-2">Password</label>
                <input type="password" name="password" id="id_password" class="form-control form-control-custom" placeholder="Enter password" required>
            </div>
            
            <button type="submit" class="btn btn-login w-100">
                <i class="fas fa-sign-in-alt me-2"></i>Sign In
            </button>
        </form>
    </div>
    
    <footer>
        ARAPS — Secure Portal
    </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
