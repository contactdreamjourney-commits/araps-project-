<!DOCTYPE html>
<html>
<head>
    <title>Delete Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>Confirm Delete</h2>
    <p>Are you sure you want to delete this result?</p>
    <p><strong>Student:</strong> {{ result.student.name }}</p>
    <p><strong>Subject:</strong> {{ result.subject.name }}</p>
    <p><strong>Marks:</strong> {{ result.marks }}</p>
    <p><strong>Grade:</strong> {{ result.letter_grade }} (GP: {{ result.grade_point }})</p>
    <p><strong>Term:</strong> {{ result.term }} / {{ result.year }}</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'teacher_dashboard' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</body>
</html>
