<!DOCTYPE html>
<html>
<head>
    <title>Edit Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>Edit Result</h2>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label>Student</label>
            <input type="text" class="form-control" value="{{ result.student.name }}" disabled>
        </div>
        <div class="mb-3">
            <label>Subject</label>
            <input type="text" class="form-control" value="{{ result.subject.name }}" disabled>
        </div>
        <div class="mb-3">
            <label>Marks (Current Grade: <strong>{{ result.letter_grade }}</strong>)</label>
            <input type="number" step="0.01" name="marks" class="form-control" value="{{ result.marks }}" required>
        </div>
        <div class="mb-3">
            <label>Term</label>
            <input type="text" name="term" class="form-control" value="{{ result.term }}" required>
        </div>
        <div class="mb-3">
            <label>Year</label>
            <input type="number" name="year" class="form-control" value="{{ result.year }}" required>
        </div>
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{% url 'teacher_dashboard' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</body>
</html>
